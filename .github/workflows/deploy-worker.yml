name: 'Deploy and Verify Cloudflare Worker'

on:
  push:
    branches:
      - 'main'
    paths:
      - 'wrangler.jsonc'
  workflow_dispatch:

# Prevent concurrent deployments from racing against each other.
concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKER_VERIFY_URL: 'https://archetypal-grow-wise-log.base44.app/.well-known/assetlinks.json'
  # Allow up to 30 s for each individual curl attempt during verification.
  VERIFY_TIMEOUT_SECONDS: '30'

jobs:
  deploy:
    # Pin to a specific Ubuntu version to avoid unexpected breakage when
    # GitHub silently upgrades 'ubuntu-latest'.
    runs-on: 'ubuntu-22.04'

    permissions:
      contents: 'read'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332' # actions/checkout@v4

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: 'Install dependencies (includes Wrangler)'
        run: npm ci

      - name: 'Build'
        run: npm run build

      - name: 'Deploy Cloudflare Worker'
        env:
          CLOUDFLARE_API_TOKEN: '${{ secrets.CLOUDFLARE_API_TOKEN }}'
          CLOUDFLARE_ACCOUNT_ID: '${{ secrets.CLOUDFLARE_ACCOUNT_ID }}'
          WRANGLER_SEND_METRICS: 'false'
          WRANGLER_TELEMETRY_DISABLE: 'true'
          CI: 'true'
        run: npx wrangler deploy

      - name: 'Verify Worker deployment'
        # Pass GitHub Actions expressions into the shell as environment variables
        # to avoid script-injection when the values are template-expanded.
        env:
          WORKER_VERIFY_URL: ${{ env.WORKER_VERIFY_URL }}
          VERIFY_TIMEOUT_SECONDS: ${{ env.VERIFY_TIMEOUT_SECONDS }}
        run: |
          echo "Checking ${WORKER_VERIFY_URL} ..."
          STATUS="000"
          for i in 1 2 3 4 5; do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time "${VERIFY_TIMEOUT_SECONDS}" \
              "${WORKER_VERIFY_URL}")
            echo "Attempt ${i}: HTTP status ${STATUS}"
            [ "${STATUS}" = "200" ] && break
            echo "Not ready yet — retrying in 10 s..."
            sleep 10
          done
          if [ "${STATUS}" != "200" ]; then
            echo "Worker verification failed — expected 200, got ${STATUS}"
            exit 1
          fi
          echo "Worker is live and responding correctly."
