name: 'Deploy and Verify Cloudflare Worker'

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/worker.js'
      - 'src/wrangler.toml'
  workflow_dispatch:

# Prevent concurrent deployments from racing against each other.
concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKER_VERIFY_URL: 'https://archetypal-grow-wise-log.base44.app/.well-known/assetlinks.json'
  # Allow up to 30 s for each individual curl attempt during verification.
  VERIFY_TIMEOUT_SECONDS: '30'

jobs:
  deploy:
    # Pin to a specific Ubuntu version to avoid unexpected breakage when
    # GitHub silently upgrades 'ubuntu-latest'.
    runs-on: 'ubuntu-22.04'

    permissions:
      contents: 'read'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332' # actions/checkout@v4

      - name: 'Setup Node.js'
        uses: 'actions/setup-node@v4'
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'src/package-lock.json'

      - name: 'Install dependencies (includes Wrangler)'
        working-directory: 'src'
        run: npm ci

      - name: 'Deploy Cloudflare Worker'
        id: deploy
        uses: 'cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65' # cloudflare/wrangler-action@v3
        continue-on-error: true
        env:
          WRANGLER_SEND_METRICS: 'false'
          # (optional, extra safety in CI)
          CI: 'true'
          # legacy/alternate env var name some versions still honor
          WRANGLER_TELEMETRY_DISABLE: true
        with:
          apiToken: '${{ secrets.CLOUDFLARE_API_TOKEN }}'
          accountId: '${{ secrets.CLOUDFLARE_ACCOUNT_ID }}'
          workingDirectory: 'src'

      - name: 'Dump Wrangler logs (on failure)'
        if: ${{ steps.deploy.outcome == 'failure' }}
        shell: bash
        run: |
          set -euxo pipefail

          DIR="${HOME}/.config/.wrangler/logs"
          echo "Wrangler logs directory: ${DIR}"
          ls -la "${DIR}" || true

          echo "All wrangler logs (newest first):"
          ls -1t "${DIR}"/wrangler-*.log 2>/dev/null || true

          LOG="$(ls -1t "${DIR}"/wrangler-*.log 2>/dev/null | head -n 1 || true)"
          echo "Most recent Wrangler log: ${LOG:-<none found>}"

          if [[ -n "${LOG}" && -f "${LOG}" ]]; then
            echo "==== BEGIN WRANGLER LOG ===="
            sed -n '1,200p' "${LOG}"
            echo "==== END WRANGLER LOG ===="
          fi

      - name: 'Fail if deploy failed'
        if: ${{ steps.deploy.outcome == 'failure' }}
        shell: bash
        run: |
          echo "Deploy step failed — marking job as failed."
          exit 1

      - name: 'Verify Worker deployment'
        # Pass GitHub Actions expressions into the shell as environment variables
        # to avoid script-injection when the values are template-expanded.
        env:
          WORKER_VERIFY_URL: ${{ env.WORKER_VERIFY_URL }}
          VERIFY_TIMEOUT_SECONDS: ${{ env.VERIFY_TIMEOUT_SECONDS }}
        run: |
          echo "Checking ${WORKER_VERIFY_URL} ..."
          STATUS="000"
          for i in 1 2 3 4 5; do
            STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" \
              --max-time "${VERIFY_TIMEOUT_SECONDS}" \
              "${WORKER_VERIFY_URL}")
            echo "Attempt ${i}: HTTP status ${STATUS}"
            [ "${STATUS}" = "200" ] && break
            echo "Not ready yet — retrying in 10 s..."
            sleep 10
          done
          if [ "${STATUS}" != "200" ]; then
            echo "Worker verification failed — expected 200, got ${STATUS}"
            exit 1
          fi
          echo "Worker is live and responding correctly."
