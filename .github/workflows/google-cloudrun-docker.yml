# This workflow build and push a Docker container to Google Artifact Registry
# and deploy it on Cloud Run when a commit is pushed to the "main"
# branch.
#
# To configure this workflow:
#
# 1. Enable the following Google Cloud APIs:
#
#    - Artifact Registry (artifactregistry.googleapis.com)
#    - Cloud Run (run.googleapis.com)
#    - IAM Credentials API (iamcredentials.googleapis.com)
#
#    You can learn more about enabling APIs at
#    https://support.google.com/googleapi/answer/6158841.
#
# 2. Create and configure a Workload Identity Provider for GitHub:
#    https://github.com/google-github-actions/auth#preferred-direct-workload-identity-federation.
#
#    Depending on how you authenticate, you will need to grant an IAM principal
#    permissions on Google Cloud:
#
#    - Artifact Registry Administrator (roles/artifactregistry.admin)
#    - Cloud Run Developer (roles/run.developer)
#
#    You can learn more about setting IAM permissions at
#    https://cloud.google.com/iam/docs/manage-access-other-resources
#
# 3. Change the values in the "env" block to match your values.

name: 'Build and Deploy to Cloud Run'

on:
  push:
    branches:
      - 'main'

env:
  PROJECT_ID: '${{ secrets.GCP_PROJECT_ID }}'
  REGION: '${{ secrets.GCP_REGION }}'
  SERVICE: '${{ secrets.CLOUD_RUN_SERVICE }}'
  REPOSITORY: '${{ secrets.GAR_REPOSITORY }}'

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      # Detect which Google Cloud authentication method has been configured.
      #
      # Option A – Workload Identity Federation (keyless, recommended):
      #   Set secrets:  WORKLOAD_IDENTITY_PROVIDER  and  GCP_SERVICE_ACCOUNT
      #   See https://github.com/google-github-actions/auth#preferred-direct-workload-identity-federation
      #
      # Option B – Service Account JSON key (simpler to set up):
      #   Set secret:   GCP_SA_KEY  (the full JSON key file contents)
      #   See https://github.com/google-github-actions/auth#authenticating-via-service-account-key-json
      - name: 'Detect auth method'
        id: 'auth-method'
        env:
          WIF: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
          SA_KEY: '${{ secrets.GCP_SA_KEY }}'
        run: |
          if [ -n "$WIF" ]; then
            echo "method=wif" >> "$GITHUB_OUTPUT"
          elif [ -n "$SA_KEY" ]; then
            echo "method=json" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No Google Cloud credentials found. Set either WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT (Workload Identity Federation) or GCP_SA_KEY (Service Account JSON key) in the repository secrets."
            exit 1
          fi

      # Option A: authenticate with Workload Identity Federation
      - id: 'auth'
        name: 'Authenticate to Google Cloud (Workload Identity Federation)'
        if: steps.auth-method.outputs.method == 'wif'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          project_id: '${{ env.PROJECT_ID }}'

      # Option B: authenticate with a Service Account JSON key
      - id: 'auth-json'
        name: 'Authenticate to Google Cloud (Service Account JSON key)'
        if: steps.auth-method.outputs.method == 'json'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          project_id: '${{ env.PROJECT_ID }}'

      # BEGIN - Docker auth and build
      #
      # If you already have a container image, you can omit these steps.
      - name: 'Docker Auth'
        run: gcloud auth configure-docker '${{ env.REGION }}-docker.pkg.dev'

      - name: 'Build and Push Container'
        run: |-
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build --tag "${DOCKER_TAG}" .
          docker push "${DOCKER_TAG}"

      # END - Docker auth and build

      - id: 'deploy'
        name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          # NOTE: If using a pre-built image, update the image name below:
          image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}'

      # If required, use the Cloud Run URL output in later steps
      - name: 'Show output'
        run: |-
          echo "${{ steps.deploy.outputs.url }}"
