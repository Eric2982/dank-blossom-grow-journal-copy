# This workflow build and push a Docker container to Google Artifact Registry
# and deploy it on Cloud Run when a commit is pushed to the "main"
# branch.
#
# To configure this workflow:
#
# 1. Enable the following Google Cloud APIs:
#
#    - Artifact Registry (artifactregistry.googleapis.com)
#    - Cloud Run (run.googleapis.com)
#    - IAM Credentials API (iamcredentials.googleapis.com)
#
#    You can learn more about enabling APIs at
#    https://support.google.com/googleapi/answer/6158841.
#
# 2. Create and configure a Workload Identity Provider for GitHub:
#    https://github.com/google-github-actions/auth#preferred-direct-workload-identity-federation.
#
#    Depending on how you authenticate, you will need to grant an IAM principal
#    permissions on Google Cloud:
#
#    - Artifact Registry Administrator (roles/artifactregistry.admin)
#    - Cloud Run Developer (roles/run.developer)
#
#    You can learn more about setting IAM permissions at
#    https://cloud.google.com/iam/docs/manage-access-other-resources
#
# 3. Change the values in the "env" block to match your values.

name: 'Build and Deploy to Cloud Run'

on:
  push:
    branches:
      - 'main'

env:
  PROJECT_ID: '${{ secrets.GCP_PROJECT_ID }}'
  REGION: '${{ secrets.GCP_REGION }}'
  SERVICE: '${{ secrets.CLOUD_RUN_SERVICE }}'
  REPOSITORY: '${{ secrets.GAR_REPOSITORY }}'

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      # Authenticate using the GCP_SA_KEY service account JSON credentials secret.
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # BEGIN - Docker auth and build
      #
      # If you already have a container image, you can omit these steps.

      # Normalize the GCP_REGION and GAR_REPOSITORY secrets before validation.
      # A common mistake is to store the full registry hostname in one or both
      # fields (e.g. "us-east4-docker.pkg.dev" instead of "us-east4", or the
      # same hostname in GAR_REPOSITORY instead of a plain repository name).
      # This step auto-corrects those values and emits a notice so the user
      # knows to update the secrets.
      - name: 'Normalize GCP secret values'
        env:
          REGION: '${{ env.REGION }}'
          REPOSITORY: '${{ env.REPOSITORY }}'
        run: |
          REGION_VAL="$REGION"
          REPOSITORY_VAL="$REPOSITORY"

          # If GCP_REGION looks like a registry hostname, strip the trailing suffix.
          if [[ "$REGION_VAL" == *-docker.pkg.dev ]]; then
            REGION_VAL="${REGION_VAL%-docker.pkg.dev}"
            echo "::warning::GCP_REGION contained '-docker.pkg.dev' suffix; normalized to '${REGION_VAL}'. Update the GCP_REGION secret to just the region (e.g. us-east4) to remove this warning."
            echo "REGION=${REGION_VAL}" >> "$GITHUB_ENV"
          fi

          # If GAR_REPOSITORY contains dots or slashes it is not a valid
          # Artifact Registry repository name.  Fall back to the GitHub
          # repository name (owner-less) which is always a safe default.
          if [[ "$REPOSITORY_VAL" == *"."* || "$REPOSITORY_VAL" == *"/"* ]]; then
            REPOSITORY_VAL="${GITHUB_REPOSITORY##*/}"
            echo "::warning::GAR_REPOSITORY contained dots or slashes (was set to a hostname or URL instead of a repository name); using GitHub repository name '${REPOSITORY_VAL}' as the Artifact Registry repository name. Update the GAR_REPOSITORY secret to just the repository name (e.g. my-app) to remove this warning."
            echo "REPOSITORY=${REPOSITORY_VAL}" >> "$GITHUB_ENV"
          fi

          echo "Using REGION=${REGION_VAL}, REPOSITORY=${REPOSITORY_VAL}"

      # Validate that the GCP_REGION secret contains a plain region identifier
      # (e.g. "us-east4"), not a full registry hostname.  A common mistake is
      # to copy the full registry URL (e.g. "us-east4-docker.pkg.dev") into the
      # secret, which appends "-docker.pkg.dev" a second time and produces an
      # invalid image reference.  Likewise GAR_REPOSITORY must be a simple
      # repository name with no dots or slashes.
      - name: 'Validate GCP secrets format'
        env:
          REGION: '${{ env.REGION }}'
          REPOSITORY: '${{ env.REPOSITORY }}'
        run: |
          if [[ "$REGION" == *"-docker.pkg.dev"* || "$REGION" == *"/"* ]]; then
            echo "::error::GCP_REGION secret looks like a registry URL instead of a region name (e.g. us-east4). Update the secret to contain only the region identifier."
            exit 1
          fi
          if [[ "$REPOSITORY" == *"."* || "$REPOSITORY" == *"/"* ]]; then
            echo "::error::GAR_REPOSITORY secret contains dots or slashes, which are not valid in an Artifact Registry repository name. It should be a simple name such as 'my-app'. A common mistake is to set it to the registry hostname (e.g. us-east4-docker.pkg.dev) — use only the repository name portion."
            exit 1
          fi
          echo "Secret format validation passed."

      - name: 'Docker Auth'
        run: gcloud auth configure-docker '${{ env.REGION }}-docker.pkg.dev'

      # Ensure the Artifact Registry Docker repository exists before pushing.
      # The repository must be created in GCP before images can be pushed to it.
      - name: 'Ensure Artifact Registry repository exists'
        env:
          REPOSITORY: '${{ env.REPOSITORY }}'
          REGION: '${{ env.REGION }}'
          PROJECT: '${{ env.PROJECT_ID || steps.auth.outputs.project_id }}'
          SERVICE: '${{ env.SERVICE }}'
        run: |
          DESCRIBE_EXIT=0
          DESCRIBE_OUTPUT=$(gcloud artifacts repositories describe "$REPOSITORY" \
            --location="$REGION" \
            --project="$PROJECT" \
            --format="value(name)" 2>&1) || DESCRIBE_EXIT=$?
          if [ "$DESCRIBE_EXIT" -eq 0 ]; then
            echo "Artifact Registry repository already exists."
          elif echo "$DESCRIBE_OUTPUT" | grep -qi "NOT_FOUND\|not found"; then
            echo "Repository not found — creating it now..."
            gcloud artifacts repositories create "$REPOSITORY" \
              --repository-format=docker \
              --location="$REGION" \
              --project="$PROJECT" \
              --description="Docker repository for ${SERVICE}"
          else
            echo "Failed to check repository existence:"
            echo "$DESCRIBE_OUTPUT"
            exit "$DESCRIBE_EXIT"
          fi

      - name: 'Build and Push Container'
        run: |-
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID || steps.auth.outputs.project_id }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build --tag "${DOCKER_TAG}" .
          docker push "${DOCKER_TAG}"

      # END - Docker auth and build

      - id: 'deploy'
        name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          # NOTE: If using a pre-built image, update the image name below:
          image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID || steps.auth.outputs.project_id }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}'

      # If required, use the Cloud Run URL output in later steps
      - name: 'Show output'
        run: |-
          echo "${{ steps.deploy.outputs.url }}"
