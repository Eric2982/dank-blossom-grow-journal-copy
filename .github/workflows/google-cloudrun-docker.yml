# This workflow build and push a Docker container to Google Artifact Registry
# and deploy it on Cloud Run when a commit is pushed to the "main"
# branch.
#
# To configure this workflow:
#
# 1. Enable the following Google Cloud APIs:
#
#    - Artifact Registry (artifactregistry.googleapis.com)
#    - Cloud Run (run.googleapis.com)
#    - IAM Credentials API (iamcredentials.googleapis.com)
#
#    You can learn more about enabling APIs at
#    https://support.google.com/googleapi/answer/6158841.
#
# 2. Create and configure a Workload Identity Provider for GitHub:
#    https://github.com/google-github-actions/auth#preferred-direct-workload-identity-federation.
#
#    Depending on how you authenticate, you will need to grant an IAM principal
#    permissions on Google Cloud:
#
#    - Artifact Registry Administrator (roles/artifactregistry.admin)
#    - Cloud Run Developer (roles/run.developer)
#
#    You can learn more about setting IAM permissions at
#    https://cloud.google.com/iam/docs/manage-access-other-resources
#
# 3. Change the values in the "env" block to match your values.

name: 'Build and Deploy to Cloud Run'

on:
  push:
    branches:
      - 'main'

env:
  PROJECT_ID: '${{ secrets.GCP_PROJECT_ID }}'
  REGION: '${{ secrets.GCP_REGION }}'
  SERVICE: '${{ secrets.CLOUD_RUN_SERVICE }}'
  REPOSITORY: '${{ secrets.GAR_REPOSITORY }}'

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      # Check whether the required GCP secrets are present before attempting
      # authentication. Secrets are not injected for fork-triggered workflows,
      # so this guard prevents a hard failure in those cases.
      - name: 'Check GCP secrets'
        id: secrets-check
        env:
          WIF_PROVIDER: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
          SA_KEY: '${{ secrets.GCP_SA_KEY }}'
          GCP_PROJECT: '${{ secrets.GCP_PROJECT_ID }}'
        run: |
          if [ -n "$WIF_PROVIDER" ] || [ -n "$SA_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Neither WORKLOAD_IDENTITY_PROVIDER nor GCP_SA_KEY secret is set — skipping GCP deployment."
          fi

      # Configure Workload Identity Federation and generate an access token.
      #
      # See https://github.com/google-github-actions/auth for more options,
      # including authenticating via a JSON credentials file.
      #
      # Supports two mutually exclusive auth methods (set exactly one):
      #   - Workload Identity Federation: set the WORKLOAD_IDENTITY_PROVIDER
      #     secret (and optionally GCP_SERVICE_ACCOUNT).
      #   - Service account key JSON: set the GCP_SA_KEY secret.
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        if: steps.secrets-check.outputs.available == 'true'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          project_id: '${{ env.PROJECT_ID }}'

      # BEGIN - Docker auth and build
      #
      # If you already have a container image, you can omit these steps.
      - name: 'Docker Auth'
        if: steps.secrets-check.outputs.available == 'true'
        run: gcloud auth configure-docker '${{ env.REGION }}-docker.pkg.dev'

      - name: 'Build and Push Container'
        if: steps.secrets-check.outputs.available == 'true'
        run: |-
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build --tag "${DOCKER_TAG}" .
          docker push "${DOCKER_TAG}"

      # END - Docker auth and build

      - id: 'deploy'
        name: 'Deploy to Cloud Run'
        if: steps.secrets-check.outputs.available == 'true'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          # NOTE: If using a pre-built image, update the image name below:
          image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}'

      # If required, use the Cloud Run URL output in later steps
      - name: 'Show output'
        if: steps.secrets-check.outputs.available == 'true'
        run: |-
          echo "${{ steps.deploy.outputs.url }}"
