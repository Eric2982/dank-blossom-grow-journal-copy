name: 'Build and Deploy to GitHub Pages'

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

# Allow only one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # Check whether the Cloudflare Worker deployment is configured.
  # If it is, that deployment is the authoritative one and correctly proxies
  # all /api/* requests (including POST analytics/track/batch) to base44.app.
  # Deploying to GitHub Pages at the same time would shadow the Worker with a
  # purely static host that cannot handle POST requests and returns 405.
  check-cloudflare:
    runs-on: ubuntu-latest
    outputs:
      cloudflare-configured: ${{ steps.check.outputs.available }}
    steps:
      - name: 'Check Cloudflare secrets'
        id: check
        env:
          CF_API_TOKEN: '${{ secrets.CLOUDFLARE_API_TOKEN }}'
          CF_ACCOUNT_ID: '${{ secrets.CLOUDFLARE_ACCOUNT_ID }}'
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-cloudflare
    if: needs.check-cloudflare.outputs.cloudflare-configured == 'false'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: 'Install dependencies'
        run: npm ci

      - name: 'Build'
        env:
          VITE_BASE44_APP_ID: ${{ secrets.VITE_BASE44_APP_ID }}
        run: npm run build

      - name: 'Configure GitHub Pages'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 'Upload Pages artifact'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 'Deploy to GitHub Pages'
        id: deployment
        uses: actions/deploy-pages@v4
