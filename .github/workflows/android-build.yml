name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Keystore from Secret
      run: |
        set -euo pipefail
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks
        ls -l android/app/release.jks

    - name: Verify keystore
      run: |
        keytool -list \
          -keystore android/app/release.jks \
          -storepass "${{ secrets.KEYSTORE_PASSWORD }}"

    - name: Setup Gradle
      working-directory: ./android
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build Debug APK
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Build Release APK
      working-directory: ./android
      env:
        KEYSTORE_FILE: ${{ github.workspace }}/android/app/release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        PLAY_INTEGRITY_CLOUD_PROJECT_NUMBER: ${{ secrets.PLAY_INTEGRITY_CLOUD_PROJECT_NUMBER }}
      run: ./gradlew assembleRelease

    - name: Upload Debug Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: android/app/build/outputs/apk/release/app-release.apk
