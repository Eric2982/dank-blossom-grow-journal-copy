server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # API routes – proxy all requests to the base44 backend so that non-GET
    # methods (e.g. POST to /api/apps/{id}/analytics/track/batch) are forwarded
    # correctly and do not get a 405 from the static file server.
    location /api/ {
        # Answer CORS preflight (OPTIONS) without forwarding to the backend.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With';
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Type'                 'text/plain; charset=utf-8';
            add_header 'Content-Length'               0;
            return 204;
        }

        proxy_pass         https://base44.app;
        proxy_set_header   Host              base44.app;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;

        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
    }

    # Support React Router (HTML5 history API)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve .jsx files as JavaScript (required if pre-transpiled .jsx files are served directly)
    location ~* \.jsx$ {
        types { application/javascript jsx; }
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets aggressively - safe because Vite produces content-hashed filenames
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
