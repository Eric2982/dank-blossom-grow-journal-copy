server {
    listen 8080;

    root /usr/share/nginx/html;
    index index.html;

    # API routes – no HTTP methods are blocked; OPTIONS preflight is answered
    # explicitly so browsers and WAFs do not reject verification requests.
    location /api/ {
        # Answer CORS preflight (OPTIONS) without forwarding to the backend.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With';
            add_header 'Access-Control-Max-Age'       1728000;
            add_header 'Content-Type'                 'text/plain; charset=utf-8';
            add_header 'Content-Length'               0;
            return 204;
        }

        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;

        try_files $uri $uri/ /index.html;
    }

    # Support React Router (HTML5 history API)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve .jsx files as JavaScript (required if pre-transpiled .jsx files are served directly)
    location ~* \.jsx$ {
        types { application/javascript jsx; }
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets aggressively - safe because Vite produces content-hashed filenames
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
